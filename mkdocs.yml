site_name: longtds 的技术手册
site_description: 服务器 · Linux · 网络 · 虚拟化 · 容器 · K8s · DevOps · 中间件 · 大数据 · AI · AIOps · 认证 · 安全 · 渗透测试 · 软件测试 · 硬件测试
site_author: longtds
site_url: https://longtds.github.io
repo_url: https://github.com/longtds/longtds.github.io
repo_name: longtds/longtds.github.io
edit_uri: edit/master/docs/

theme:
  name: material
  language: zh
  features:
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.prune
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: teal
  font:
    text: Noto Sans SC
    code: JetBrains Mono

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.keys
  - pymdownx.emoji
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - search:
      lang: zh
  - tags

extra:
  version:
    provider: mike
  generator: false

copyright: ""

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/nav-filter.js

